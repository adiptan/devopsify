version: '3.8'

services:
  devops_bot:
    build: .
    container_name: devops_interview_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data  # Persistent database
    environment:
      - DATABASE_PATH=/app/data/devops_bot.db
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
